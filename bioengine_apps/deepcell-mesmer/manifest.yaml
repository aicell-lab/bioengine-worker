name: DeepCell Mesmer — Whole-Cell Segmentation
id: deepcell-mesmer
id_emoji: "🔷"
covers: []
description: "Whole-cell and nuclear segmentation for spatial proteomics (CODEX, CyCIF, IMC, MIBI-ToF) using DeepCell's Mesmer model trained on TissueNet (1M+ annotated cells). Accepts nuclear and membrane/cytoplasm markers."
type: ray-serve
format_version: 0.5.0
version: 1.0.0
authors:
  - {name: "BioEngine Team", affiliation: "KTH Royal Institute of Technology", github_user: "oeway"}
maintainers: [oeway]
license: Apache-2.0
git_repo: https://github.com/aicell-lab/bioengine-worker
links:
  - {label: "DeepCell / Mesmer (Nature Biotechnology 2022)", url: "https://doi.org/10.1038/s41587-021-01094-0"}
  - {label: "TissueNet dataset", url: "https://datasets.deepcell.org/"}
tags: [deepcell, mesmer, spatial-proteomics, codex, cycif, imc, mibi-tof, whole-cell, tissue, multiplex]
deployments:
  - mesmer_deployment:MesmerDeployment
authorized_users:
  - "*" # Allow all users to access the application
