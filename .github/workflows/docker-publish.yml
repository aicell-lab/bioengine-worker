name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'bioengine/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - 'docker/**'
      - '.dockerignore'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Extract current version from pyproject.toml
      run: |
        VERSION=$(grep -E '^version\s*=' pyproject.toml | sed -E 's/version\s*=\s*"(.*)"/\1/')
        if [ -z "$VERSION" ]; then
          echo "❌ Could not extract version from pyproject.toml"
          exit 1
        fi
        echo "📦 Extracted version: $VERSION"
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Get latest version from container registry
      run: |
        if ! command -v skopeo &> /dev/null; then
            echo "skopeo could not be found, installing..."
            sudo apt-get update && sudo apt-get install -y skopeo
        fi

        # Check both the current image and the legacy bioengine-worker
        # name (the repo was renamed; old releases live there).
        IMAGES=(
          "docker://ghcr.io/${{ github.repository }}"
          "docker://ghcr.io/aicell-lab/bioengine-worker"
        )

        ALL_TAGS=""
        for IMAGE in "${IMAGES[@]}"; do
          echo "🔍 Fetching tags for $IMAGE..."
          if skopeo list-tags "$IMAGE" > /dev/null 2>&1; then
            TAGS=$(skopeo list-tags "$IMAGE" | jq -r '.Tags[]')
            echo "   found $(echo "$TAGS" | wc -l) tag(s)"
            ALL_TAGS+=$'\n'"$TAGS"
          else
            echo "   not found in registry (skipping)"
          fi
        done

        # Filter out 'latest' and any non-version tags, then sort
        LATEST_VERSION=$(echo "$ALL_TAGS" \
          | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' \
          | sort -V \
          | tail -n1)

        if [ -z "$LATEST_VERSION" ]; then
          echo "❌ No version tags found in either registry namespace."
          exit 1
        fi

        echo "📦 Latest published version (across both image names): $LATEST_VERSION"
        echo "PREVIOUS_VERSION=$LATEST_VERSION" >> $GITHUB_ENV

    - name: Check that version is updated and newer
      run: |
        echo "📦 Previous version: $PREVIOUS_VERSION"
        echo "📦 Current version:  $VERSION"
        if [ "$VERSION" = "$PREVIOUS_VERSION" ]; then
          echo "❌ Version has not been updated. Please bump the version in pyproject.toml."
          exit 1
        fi
        if [ "$(printf '%s\n' "$PREVIOUS_VERSION" "$VERSION" | sort -V | head -n1)" = "$VERSION" ]; then
          echo "❌ New version ($VERSION) is not greater than previous version ($PREVIOUS_VERSION)."
          exit 1
        fi
        echo "✅ Version updated correctly."

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push worker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/worker.Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ghcr.io/aicell-lab/bioengine:latest
          ghcr.io/aicell-lab/bioengine:${{ env.VERSION }}
        labels: |
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
        cache-from: type=gha,scope=worker
        cache-to: type=gha,mode=max,scope=worker

    - name: Build and push datasets image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/datasets.Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ghcr.io/aicell-lab/bioengine-datasets:latest
          ghcr.io/aicell-lab/bioengine-datasets:${{ env.VERSION }}
        labels: |
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
        cache-from: type=gha,scope=datasets
        cache-to: type=gha,mode=max,scope=datasets
